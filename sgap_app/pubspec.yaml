name: sgap_app
description: "S-GAP - Smart Gig-worker Assistance Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.4.0

  # Security
  flutter_secure_storage: ^9.0.0

  # State Management
  flutter_riverpod: ^2.4.10

  # Routing
  go_router: ^13.1.0

  # Permissions
  permission_handler: ^11.2.0

  # Audio
  record: ^5.0.4
  audioplayers: ^6.0.0

  # Animations
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.66.2

  # Utilities
  qr_flutter: ^4.1.0
  share_plus: ^9.0.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
